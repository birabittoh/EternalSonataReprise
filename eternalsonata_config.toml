# ============================================================================
# SDK WORKAROUND #2 -- REMOVE once the SDK fix is in the pinned nightly.
#   Upstream fix: rexglue-sdk commit 758356f on branch fix/gapfill-split-bctr-thunks
#   ("split GapFill regions on unconditional b (tail branches)").
#
# Real functions that physically follow an unconditional tail-call `b` to a target
#   not yet discovered (e.g. sub_822AF288: addi r3,r3,-4; b 0x822AFB68, immediately
#   followed by the function at 0x822AF290). Without the SDK fix the GapFill segment
#   swallows the following function and block discovery stops at the branch, leaving
#   it unregistered -> "Call to invalid or unregistered function".
# ============================================================================
"0x820ED4F8" = { name = "sub_820ED4F8" }
"0x821BBBC8" = { name = "sub_821BBBC8" }
"0x8228D440" = { name = "sub_8228D440" }
