# eternalsonata - ReXGlue codegen config
#
# Add named functions (indirect-call targets), midasm hooks, and CRT
# addresses here once they are located in assets/default.xex.
#
# Example:
#   [functions]
#   0x8XXXXXXX = {name = "MyFunction"}
#
#   [[midasm_hook]]
#   address = 0x8XXXXXXX
#   name = "MyHook"
#   registers = ["r3"]
#   return = true
#
#   [rexcrt]
#   memcpy  = 0x8XXXXXXX
#   memset  = 0x8XXXXXXX
#   memmove = 0x8XXXXXXX

[functions]
"0x822B90D0" = { name = "sub_822B90D0" }  # tail-call target from 0x822B7274 (UnresolvedCall)
# ============================================================================
# SDK WORKAROUND #1 -- REMOVE once the SDK fix is in the pinned nightly.
#   Upstream fix: rexglue-sdk commit 6f9ff97 on branch fix/gapfill-split-bctr-thunks
#   ("split GapFill regions on unconditional bctr"). The manifest pins
#   sdk_version 0.8.1 / nightly-20260605-f22cd9dc, which predates the fix.
#
# Virtual-call forwarder thunks: 16-byte stubs
#   (lwz r12,0(r3); lwz r11,slot(r12); mtctr r11; bctr) that dispatch through the
#   object vtable. The big contiguous run is 0x82177D30-0x821783D0; a few more live
#   elsewhere. Reached only via indirect (vtable) calls, and the game ships without
#   RTTI, so the RTTI-based vtable scan misses them. Without the SDK fix GapFill
#   never splits these bctr-terminated stubs into individual functions, so any
#   vtable call into them traps: "Call to invalid or unregistered function".
# ============================================================================
